# ============================================================================
# DPS — Document Processing System — Master Configuration
# ============================================================================
#
# This ONE file controls everything: input location, output location, and
# every tunable setting for every script in the pipeline.
#
# PIPELINE ORDER (scripts run in this sequence):
#   Step 0  policy_profiler.py            Scan & classify all docs (includes word counts)
#   Step 1  extract_controls.py           Pull structured control data
#   Step 2  cross_reference_extractor.py  Capture cross-refs (BEFORE any edits)
#   Step 3  heading_style_fixer.py        Fix fake headings → real Word styles
#   Step 4  section_splitter.py           Split docs at H1 boundaries
#   Step 5  add_metadata.py              Stamp sub-docs with identity metadata
#
# HOW TO RUN:
#   Full pipeline:   python run_pipeline.py
#   Single script:   python run_pipeline.py --step 0
#   Range of steps:  python run_pipeline.py --step 1-3
#   Standalone:      python scripts/extract_controls.py --config dps_config.yaml input/ output/1\ -\ controls/
#
# ----------------------------------------------------------------------------
# QUICK START — Check these first, everything else has sensible defaults:
#
#   SETTING                              SECTION   WHAT IT DOES
#   input.directory                      1         Where your .docx files are
#   output.directory                     2         Where results are written
#   thresholds.max_characters            8         AI context window size limit
#   headings.custom_heading_styles       4         Your org's Word heading styles
#   control_extraction.control_id_patterns  10     Regex for your control ID format
#   metadata.url.*                       12        SharePoint URL mapping
#
# You can run the full pipeline without changing anything else.
# ============================================================================


# ============================================================================
# SECTION 1: INPUT — Where your .docx source files live        [YOU SET THIS]
# ============================================================================
# ALL scripts read from this ONE folder. Drop your policy .docx files here.

input:
  # Path to the folder containing your .docx policy documents.
  # Can be absolute or relative to where you run the script from.
  directory: "./input"

  # File glob pattern — almost always "*.docx"
  pattern: "*.docx"

  # Scan sub-folders inside the input directory?
  # Set true if your docs are organized into sub-folders.
  # Set false if everything is flat in one folder (most common).
  recursive: false

  # Skip files matching ANY of these patterns (case-insensitive substring match).
  # Word creates invisible temp files when a doc is open — "~$" catches those.
  exclude_patterns:
    - "~$"           # Word temp/lock files (created when a doc is open)
    - "_optimized"   # Already-processed files from a previous run
    - "_backup"      # Backup copies
    - "_fixed"       # Output from Step 3 (heading fixer) — don't re-process
    - "template"     # Template files, not actual policies


# ============================================================================
# SECTION 2: OUTPUT — Where results go                         [YOU SET THIS]
# ============================================================================
# Sub-folders are created automatically on first run:
#   0 - profiler/  1 - controls/  2 - cross_references/
#   3 - heading_fixes/  4 - split_documents/  5 - metadata/

output:
  directory: "./output"

  # --- Step 0: Profiler outputs (includes word counts) ---
  profiler:
    directory: "0 - profiler"
    inventory_file: "document_inventory.xlsx"    # Master spreadsheet — start here
    json_file: "document_profiles.json"          # Machine-readable profiles
    sections_file: "section_inventory.csv"       # One row per section per doc
    tables_file: "table_inventory.csv"           # One row per table per doc
    crossrefs_file: "crossref_inventory.csv"     # One row per cross-reference

  # --- Step 1: Control extractor outputs ---
  controls:
    directory: "1 - controls"
    output_file: "controls_output.csv"
    output_file_xlsx: "controls_output.xlsx"
    checkpoint_file: "checkpoint.json"           # Tracks progress for resume
    error_log: "errors.log"

  # --- Step 2: Cross-reference extractor outputs ---
  cross_references:
    directory: "2 - cross_references"
    output_file: "cross_references.csv"

  # --- Step 3: Heading style fixer outputs ---
  heading_fixes:
    directory: "3 - heading_fixes"
    changes_file: "heading_changes.csv"
    # Fixed .docx files are also written here (named *_fixed.docx)

  # --- Step 4: Section splitter outputs ---
  split_documents:
    directory: "4 - split_documents"
    manifest_file: "split_manifest.csv"
    # Sub-document .docx files are also written here

  # --- Step 5: Metadata injector outputs ---
  metadata:
    directory: "5 - metadata"
    manifest_file: "metadata_manifest.csv"
    # Processed .docx files with metadata blocks are also written here

  # --- Step 6: Validation outputs ---
  validation:
    directory: "6 - validation"
    output_file: "control_validation.csv"

  # --- Consolidated Excel Report ---
  # After all steps complete, build a single .xlsx workbook with one tab
  # per step's CSV output. Timestamped filename for versioning.
  consolidated_report:
    enabled: true
    filename_prefix: "DPS_Report"    # produces DPS_Report_2026-03-23_143052.xlsx


# ============================================================================
# SECTION 3: DOCUMENT STRUCTURE DETECTION (used by Step 0)   [LEAVE AS-IS]
# ============================================================================
# Keywords the profiler matches against H1 headings to classify each section.
# Docs missing standard sections get flagged higher priority.
# Only edit if your org uses different section names than listed below.

sections:
  purpose:
    - "purpose"
    - "policy purpose"
    - "1.0 purpose"
    - "document purpose"
  scope:
    - "scope"
    - "policy scope"
    - "2.0 scope"
    - "applicability"
    - "applicability and scope"
  intent:
    - "intent"
    - "policy intent"
    - "3.0 intent"
    - "objective"
    - "policy objective"
    - "security objective"
  controls:
    - "controls"
    - "technical controls"
    - "security controls"
    - "4.0 controls"
    - "control requirements"
    - "requirements"
    - "policy requirements"
    - "implementation requirements"
  appendix:
    - "appendix"
    - "appendices"
    - "5.0 appendix"
    - "supplementary"
    - "reference"
    - "references"
    - "glossary"
    - "definitions"


# ============================================================================
# SECTION 4: HEADING DETECTION (used by Step 0 + Step 3)
# ============================================================================

headings:

  # ~~~ Custom styles — YOU MAY WANT TO CHANGE THESE ~~~~~~~~~~~~~~~~~~~~~~~~

  # Standard Word heading style names (rarely needs editing)
  builtin_styles:
    - "Heading 1"
    - "Heading 2"
    - "Heading 3"
    - "Heading 4"
    - "heading 1"
    - "heading 2"
    - "heading 3"
    - "heading 4"

  # Custom heading style names used in your org's Word templates.
  # If headings show up as "FAKE" in the profiler but they're real headings
  # in Word, add the style name here. (In Word: click the heading → check
  # the Styles pane on the Home tab for the active style name.)
  custom_heading_styles:
    - "Policy Heading 1"
    - "Policy Heading 2"
    - "TOC Heading"
    - "AppendixHeading"

  # Maps your org's custom styles → standard Heading 1/2/3 (case-insensitive keys).
  # The heading fixer (Step 3) uses this to convert styles the splitter can recognize.
  custom_style_map:
    "policy heading 1": "Heading 1"
    "policy heading 2": "Heading 2"
    "policy heading 3": "Heading 3"
    "policyheading1": "Heading 1"
    "policyheading2": "Heading 2"
    "policyheading3": "Heading 3"
    "doc heading 1": "Heading 1"
    "doc heading 2": "Heading 2"
    "doc heading 3": "Heading 3"
    "heading1": "Heading 1"
    "heading2": "Heading 2"
    "heading3": "Heading 3"
    "title heading": "Heading 1"
    "section heading": "Heading 1"
    "subsection heading": "Heading 2"
    # ADD YOUR ORG'S CUSTOM STYLE NAMES BELOW THIS LINE:

  # ~~~ Fake heading detection — LEAVE AS-IS unless tuning ~~~~~~~~~~~~~~~~~~
  #
  # A "fake heading" is bold text with no Word Heading style applied.
  # The profiler flags these; the heading fixer (Step 3) converts them.

  # Min font size (pt) for bold text to be considered a fake heading.
  # Too few detected? Lower to 11. Too many false positives? Raise to 13-14.
  fake_heading_min_font_size: 12

  # Max character length to qualify as a fake heading.
  # The profiler uses a wider net (200) to flag candidates for review.
  # The fixer uses a tighter limit (120) to avoid false positives during conversion.
  fake_heading_max_chars: 200
  fake_heading_max_chars_fixer: 120

  # ~~~ Heading level numbering patterns — LEAVE AS-IS unless tuning ~~~~~~~~
  #
  # Regex patterns that determine what level to assign a fake heading.
  # EXAMPLES: "1.0 Purpose" → H1, "1.1 Access" → H2, "1.1.1 Sub" → H3
  # To add patterns (e.g., "Article 1"): add alternatives with | in the group.
  heading1_pattern: "^(?:\\d+\\.0\\s+|[IVXLC]+\\.\\s+)"
  heading2_pattern: "^(?:\\d+\\.\\d+\\s+|[A-Z]\\.\\s+)"
  heading3_pattern: "^\\d+\\.\\d+\\.\\d+\\s+"

  # Default level when no numbering pattern matches. Change to 1 if your
  # un-numbered bold headings are mostly top-level.
  default_heading_level: 2


# ============================================================================
# SECTION 4B: TEXT DELETION (used by Step 3 — Heading Style Fixer)
# ============================================================================
# Remove specific phrases, words, or sentences from documents during
# heading style fixing (Step 3). Deletions cascade to Steps 4 and 5.
#
# IMPORTANT: Matching is case-sensitive by default. Set case_sensitive: false
# for case-insensitive matching.
#
# WARNING: Deletions are permanent in the output files. The original input
# files are never modified. Review heading_changes.csv after running.

text_deletions:
  enabled: false    # Set to true to activate deletion
  case_sensitive: true

  # Phrases to delete (exact match). Leading/trailing whitespace is trimmed.
  # After deletion, double-spaces are collapsed to single spaces.
  phrases:
    # - "Cloud is the BEST"
    # - "DRAFT - NOT FOR DISTRIBUTION"
    # - "CONFIDENTIAL"
    # - "[INSERT DATE]"
    # - "TBD"


# ============================================================================
# SECTION 5: CROSS-REFERENCE DETECTION (used by Step 0 + Step 2) [LEAVE AS-IS]
# ============================================================================

cross_references:

  # ~~~ Profiler patterns (Step 0) — LEAVE AS-IS ~~~~~~~~~~~~~~~~~~~~~~~~~~~
  # Regex patterns for COUNTING cross-references. You probably don't need to
  # edit these — they cover standard policy language. (regex101.com to test.)
  profiler_patterns:
    - "see section\\s+[\\d\\.]+[a-z]?"
    - "refer to\\s+(section|the)"
    - "as described in\\s+(the|section)"
    - "per section\\s+[\\d\\.]+"
    - "in accordance with\\s+(the|section)"
    - "as defined in\\s+(the|section)"
    - "as outlined in\\s+(the|section)"
    - "per the organization'?s\\s+\\w+"
    - "see the\\s+\\w+\\s+policy"
    - "as specified in\\s+(the|section)"

  # ~~~ Extraction patterns (Step 2) — LEAVE AS-IS unless adding phrases ~~~~
  #
  # Each entry: phrase (lead-in text) + type ("internal" or "external").
  # The extractor auto-builds the full regex — just provide the phrase.
  #
  #   internal → matches "<phrase> Section <number>"   e.g., "See Section 4.3"
  #   external → matches "<phrase> [the] <Doc Name>"   e.g., "Refer to the Access Control Policy"
  #              (final word must be in document_name_keywords below)
  #
  # To add a pattern: add a phrase + type entry. Uncomment examples below.

  extraction_patterns:
    # --- Internal references (point to a section number within the same doc) ---
    - phrase: "see"
      type: "internal"
    - phrase: "refer to"
      type: "internal"
    - phrase: "per"
      type: "internal"
    - phrase: "as described in"
      type: "internal"
    - phrase: "as defined in"
      type: "internal"
    # - phrase: "as outlined in"          # Uncomment if your docs use this phrasing
    #   type: "internal"
    # - phrase: "as specified in"         # Uncomment if your docs use this phrasing
    #   type: "internal"
    # - phrase: "pursuant to"             # Uncomment for legal/regulatory docs
    #   type: "internal"
    # - phrase: "noted in"               # Uncomment for audit/assessment docs
    #   type: "internal"

    # --- External references (point to another named document) ---
    - phrase: "as described in"
      type: "external"
    - phrase: "as defined in"
      type: "external"
    - phrase: "refer to"
      type: "external"
    - phrase: "in accordance with"
      type: "external"
    # - phrase: "as outlined in"          # Uncomment if your docs use this phrasing
    #   type: "external"
    # - phrase: "as specified in"         # Uncomment if your docs use this phrasing
    #   type: "external"
    # - phrase: "as required by"          # Uncomment for compliance/regulatory docs
    #   type: "external"
    # - phrase: "consistent with"         # Uncomment for alignment references
    #   type: "external"
    # - phrase: "pursuant to"             # Uncomment for legal/regulatory docs
    #   type: "external"
    # - phrase: "established in"          # Uncomment for foundational references
    #   type: "external"
    # - phrase: "governed by"             # Uncomment for governance docs
    #   type: "external"
    # - phrase: "mandated by"             # Uncomment for mandate/directive docs
    #   type: "external"

  # Also detect hyperlinks whose display text looks like a section or policy ref?
  detect_hyperlink_crossrefs: true

  # Extract URLs from hyperlinks (external, internal bookmarks) and bare text URLs?
  detect_urls: true

  # External patterns match document names ending in one of these keywords.
  # Add keywords if your org has docs ending in other words (e.g., "Manual").
  document_name_keywords:
    - "Policy"
    - "Standard"
    - "Plan"
    - "Procedure"
    - "Guide"
    - "Guideline"
    - "Program"
    - "Framework"
    - "Charter"
    # - "Manual"       # Uncomment if you have documents ending in "Manual"
    # - "Controls"     # Uncomment if you have documents ending in "Controls"
    # - "Regulation"   # Uncomment if you have documents ending in "Regulation"
    # - "Directive"    # Uncomment if you have documents ending in "Directive"
    # - "Handbook"     # Uncomment if you have documents ending in "Handbook"
    # - "Playbook"     # Uncomment if you have documents ending in "Playbook"


# ============================================================================
# SECTION 6: TABLE CLASSIFICATION (used by Step 0)              [LEAVE AS-IS]
# ============================================================================
# Keywords matched against table header rows to classify table types.

tables:
  classification:
    control_matrix:
      keywords:
        - "control id"
        - "control"
        - "requirement"
        - "framework"
        - "nist"
        - "status"
        - "implementation"
        - "responsible"
        - "owner"
      min_columns: 3
    applicability_table:
      keywords:
        - "applies to"
        - "applicability"
        - "system"
        - "environment"
        - "in scope"
        - "yes"
        - "no"
        - "n/a"
      min_columns: 2
    reference_table:
      keywords:
        - "term"
        - "definition"
        - "acronym"
        - "glossary"
        - "abbreviation"
        - "description"
      min_columns: 2
    crosswalk_table:
      keywords:
        - "nist"
        - "cis"
        - "cmmc"
        - "iso"
        - "mapping"
        - "alignment"
        - "framework"
      min_columns: 3
    role_responsibility:
      keywords:
        - "role"
        - "responsibility"
        - "responsible"
        - "accountable"
        - "raci"
      min_columns: 2


# ============================================================================
# SECTION 7: DOCUMENT TYPE CLASSIFICATION (used by Step 0)     [LEAVE AS-IS]
# ============================================================================
# Auto-classifies docs into Types A/B/C/D/E based on content analysis.
# A=table-heavy, B=prose-heavy, C=hybrid, D=appendix-dominant, E=unclassified

classification:
  type_a:
    min_table_content_pct: 40    # >40% of character content lives in tables
  type_b:
    max_table_content_pct: 10    # <10% of character content in tables
  type_c:
    procedure_keywords:           # Keywords that signal embedded procedures
      - "step 1"
      - "step 2"
      - "procedure"
      - "escalation"
      - "workflow"
      - "response process"
      - "playbook"
  type_d:
    min_appendix_content_pct: 60  # >60% of content in appendix sections


# ============================================================================
# SECTION 7b: PROFILING FLAGS (used by Step 0)
# ============================================================================
# Per-document flags that surface additional profiling dimensions beyond
# the A-E type classification. These appear as columns in document_inventory.xlsx.

profiling_flags:

  # ControlDense — flags docs with a high ratio of control IDs per page.
  # Uses the same control_id_patterns from Section 11 (control_extraction).
  control_dense:
    min_controls_per_page: 5.0    # Flag if >= this many control IDs per approx page

  # HeadingVariance — flags docs with structural heading issues:
  #   level skips (H1→H3 with no H2), flat structure (H1 only, no H2),
  #   or high ratio of fake headings vs real heading styles.
  heading_variance:
    max_level_skips: 2            # Flag if >= this many heading level jumps (e.g., H1→H3)
    max_fake_ratio: 0.5           # Flag if >= 50% of headings are fake (bold-not-styled)

  # TableDense — flags docs where >= 30% of content lives in tables.
  # Lower threshold than Type A (40%). Acts as an early warning.
  table_dense:
    min_table_content_pct: 30     # Flag if >= 30% table content


# ============================================================================
# SECTION 8: SIZE & OPTIMIZATION THRESHOLDS
# ============================================================================

thresholds:

  # ~~~ Key setting — YOU MAY WANT TO CHANGE ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

  # ─── RAG CHUNK SIZE ───────────────────────────────────────────────────────
  # max_characters controls the maximum size of each split sub-document.
  #
  # WHY THIS MATTERS FOR RAG:
  #   RAG retrieval sends the top-N matching chunks to the LLM as context.
  #   Smaller, focused chunks = higher retrieval precision (fewer irrelevant
  #   tokens competing with the answer) + more candidates fit in the context
  #   window. One 36k chunk is retrieved as a unit — if only 2k is relevant,
  #   you're burning 34k tokens of context budget on noise every query.
  #
  # HOW STEP 4 SPLITS (greedy accumulation):
  #   H2 sub-sections are grouped together until adding the next one would
  #   push the chunk over this limit. The split then happens at THAT H2
  #   heading boundary — never mid-section. Each sub-document is as large
  #   as possible without exceeding the limit.
  #
  # TUNING GUIDE:
  #   36,000  → ~20 pages — fits Copilot Studio / GPT-4o (default)
  #   18,000  → ~10 pages — tighter chunks, better precision for dense docs
  #   72,000  → ~40 pages — fewer files; use only for very sparse policy docs
  #   Lower value = more sub-documents, better RAG precision, more SharePoint items
  max_characters: 36000
  max_pages: 20              # Approximate page equivalent (reporting only)

  # ~~~ Estimation ratios — LEAVE AS-IS unless calibrating ~~~~~~~~~~~~~~~~~~

  # Page estimation: approx_pages = total_paragraphs / paragraphs_per_page
  # Too high? Lower to 20-25. Too low? Raise to 35-40.
  paragraphs_per_page: 30

  # Chars per page for split manifest estimates.
  # 1,800 is typical. Lower (1,200) for table-heavy, higher (2,200) for dense prose.
  chars_per_page: 1800

  # Flag sections exceeding this % of total doc length
  section_dominance_pct: 50

  # Flag documents with more tables than this
  high_table_count: 10


# ============================================================================
# SECTION 9: PRIORITY SCORING (used by Step 0)                  [LEAVE AS-IS]
# ============================================================================
# Higher score = more optimization work needed = process sooner.
# Weights are relative — adjust ratios to change what matters most.

priority_scoring:
  weights:
    table_count: 2.0          # More tables = harder to optimize
    cross_ref_count: 1.5      # More cross-refs = more manual work
    fake_heading_count: 1.0   # Fake headings break chunking
    page_count: 0.5           # Longer docs need more splitting
    missing_sections: 1.5     # Missing standard sections = structural problems
    merged_cells: 1.0         # Merged cells complicate table flattening
    over_size_limit: 3.0      # Over character limit is a hard retrieval problem

  # OPTIONAL: Per-document usage frequency (scale 0-10). Multiplied by 2.0
  # and added to priority. Filenames must match exactly.
  # Example:
  #   usage_frequency:
  #     "Access_Control_Policy_POL-AC-2026-001.docx": 9
  #     "Incident_Response_Policy_POL-IR-2026-003.docx": 8
  usage_frequency: {}


# ============================================================================
# SECTION 10: KEY TERM SEARCH (used by Step 0 — Document Profiler)
# ============================================================================
# Search for specific terms across all documents. Results appear as columns
# in the Document Inventory Excel. Useful for finding which docs mention
# specific frameworks, technologies, or concepts.

search_terms:
  enabled: true

  # Each term gets its own column in the Excel output.
  # Use short, distinct terms. Regex is NOT supported (plain text only).
  terms:
    - "AC"
    - "Cloud"
    # - "NIST"
    # - "encryption"
    # - "incident response"

  # How to match:
  #   "word"       — whole-word boundary (e.g., "AC" matches "AC-1" but not "ACCESS")
  #   "substring"  — anywhere in text (e.g., "AC" matches "ACCESS", "PRACTICAL")
  match_mode: "word"

  # true = show occurrence count, false = show YES/blank
  show_counts: true


# ============================================================================
# SECTION 11: CONTROL EXTRACTION (used by Step 1 — Extract Controls)
# ============================================================================

control_extraction:

  # ~~~ Common settings — CHECK THESE FIRST ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

  # Regex to match control IDs. Matches: AC-1.001, IR001.002, CFG.1.0042
  # If zero controls extracted, your IDs may use a different format — add alternatives:
  #   - '\b[A-Z]{2,4}-\d{1,3}\b'           # Simple: AC-1, IR-3
  #   - '\b[A-Z]{2,4}\.\d{1,3}\.\d{1,3}\b' # Dotted: AC.1.1, IR.3.2
  control_id_patterns:
    - '\b[A-Z]{2,4}[-.]?\d{1,3}[-.]\d{2,4}\b'  # AC-1.001, IR001.002, CFG.1.0042
    - '\b[A-Z]{2,4}\s+\d{1,3}\.\d{2,4}\b'      # AUP 1.001, ACC 01.001 (with space)
    - '\b[A-Z]{2,4}\d{2,3}\.\d{2,4}\b'         # ACC01.001 (no separator before digits)

  # Filter by control ID. Supports exact IDs ("AC-1.001") and wildcards ("AC-*").
  whitelist: []               # If non-empty, ONLY matching controls are kept
  blacklist: []               # Matching controls are excluded (applied after whitelist)

  # Skip already-processed files on re-run (useful for large batches)
  enable_checkpoint: true

  # Output format: "csv", "xlsx", or "both"
  output_format: "both"

  # ~~~ Advanced settings — LEAVE AS-IS unless tuning ~~~~~~~~~~~~~~~~~~~~~~~

  # Keywords marking the boundary between control text and supplemental guidance.
  guidance_keywords:
    - "implementation guidance"
    - "implementation:"
    - "guidelines:"
    - "how to implement"
    - "supplemental guidance"

  # Metadata trigger keywords — extract doc-level metadata from first N paragraphs.
  metadata_triggers:
    purpose:
      - "purpose"
      - "objective"
      - "intent"
    scope:
      - "scope"
      - "coverage"
      - "boundary"
    applicability:
      - "applicability"
      - "applies to"
      - "applies for"

  # How the extractor identifies section boundaries.
  heading_detection:
    use_word_heading_style: true
    section_keyword_pattern: '^[Ss]ection\s+\d{1,2}'
    numbered_title_pattern: '^\d{1,2}\.?\d{0,2}\s+[A-Z][a-zA-Z\s]{3,50}$'
    detect_allcaps: true
    allcaps_max_length: 80
    allcaps_min_words: 3
    detect_bold_short: true
    bold_max_length: 60

  # Regex for guidance boundary within a control block
  implementation_trigger: '(?i)(implementation guidance|implementation:|guidelines:|how to implement|supplemental guidance)'

  # How many paragraphs from the top of each doc to scan for metadata
  metadata_scan_paragraphs: 40


# ============================================================================
# SECTION 11: PIPELINE STEPS (used by run_pipeline.py)
# ============================================================================
# Set enabled: false to skip a step. You can still run it with --step N.

pipeline:
  steps:
    - name: "Step 0 - Document Profiler"
      script: "policy_profiler.py"
      enabled: true
      description: "Scan all docs, extract metadata, classify types, score priority, count words"

    - name: "Step 1 - Control Extractor"
      script: "extract_controls.py"
      enabled: true
      description: "Extract structured control data from compliance docs"

    - name: "Step 2 - Cross-Reference Extractor"
      script: "cross_reference_extractor.py"
      enabled: true
      description: "Capture all cross-refs BEFORE any structural changes"

    - name: "Step 3 - Heading Style Fixer"
      script: "heading_style_fixer.py"
      enabled: true
      description: "Convert fake bold headings to real Word Heading styles"

    - name: "Step 4 - Section Splitter"
      script: "section_splitter.py"
      enabled: true
      description: "Split fixed docs at H1 boundaries into sub-documents"

    - name: "Step 5 - Metadata Injector"
      script: "add_metadata.py"
      enabled: true
      description: "Add identity metadata (name, URL, scope, intent, tags) to sub-documents"

    - name: "Step 6 - Control Validator"
      script: "validate_controls.py"
      enabled: true
      description: "Validate all Step 1 controls are present in Step 4 split documents"


# ============================================================================
# SECTION 12: METADATA INJECTION (used by Step 5 — Add Metadata)
# ============================================================================
# Stamps each sub-document with identity metadata (name, URL, scope, etc.)
# so Copilot/RAG always knows what document a chunk came from.

metadata:

  # ~~~ Common settings — YOU MAY WANT TO CHANGE ~~~~~~~~~~~~~~~~~~~~~~~~~~~~

  # Where to insert the metadata block:
  #   "top"            — top of document (default, best for most RAG scenarios)
  #   "top_and_bottom" — both ends (for longer chunks where top may be truncated)
  #   "each_page"      — Word header on every page (for Word/PDF viewing)
  placement: "top"

  add_separator: true         # Horizontal rule after metadata block
  font_size: 8                # Font size (pt) for metadata text
  label_color: "2F5496"       # Hex RGB color for metadata labels (blue)

  # --- Fields: what metadata appears and in what order ---
  # Set enabled: false to hide a field. Reorder by moving entries up/down.
  # source: "auto" = built-in resolver, "static" = fixed value, "excel" = from spreadsheet
  fields:
    - key: "name"
      label: "Document"
      enabled: true
      source: "auto"            # resolved from filename + split manifest

    - key: "url"
      label: "URL"
      enabled: true
      source: "auto"            # resolved from Excel lookup or fallback template

    - key: "scope"
      label: "Scope"
      enabled: true
      source: "auto"            # extracted from profiler data or direct doc scan

    - key: "intent"
      label: "Intent"
      enabled: true
      source: "auto"            # extracted from profiler data or direct doc scan

    - key: "tags"
      label: "Tags"
      enabled: true
      source: "auto"            # generated from doc type, sections, acronyms

    # --- Custom field examples (uncomment and edit) ---
    #
    # - key: "classification"        # Static: same value on every document
    #   label: "Classification"
    #   enabled: true
    #   source: "static"
    #   value: "CUI // SP-NOFORN"
    #
    # - key: "owner"                 # Excel: pulled from your URL lookup spreadsheet
    #   label: "Document Owner"
    #   enabled: true
    #   source: "excel"
    #   excel_column: "Owner"        # must match a column header in your Excel file

  # ~~~ URL Resolution — SET THIS if you want URLs in metadata ~~~~~~~~~~~~~~
  #
  # Resolution order: 1) Excel lookup → 2) fallback template → 3) "(URL not configured)"
  url:
    # Excel file mapping document names → URLs. Leave "" to skip.
    # Needs at least a name column and a URL column.
    # Matching: Excel name is checked as a substring of the .docx filename (case-insensitive).
    lookup_file: ""
    name_column: "Document Name"    # Column header for doc names
    url_column: "SharePoint URL"    # Column header for URLs
    sheet: 0                        # Sheet name (string) or index (0 = first)

    # Fallback URL template when no Excel match found. Use {filename} as placeholder.
    # Example: "https://contoso.sharepoint.com/sites/Policies/Shared Documents/{filename}"
    fallback_template: ""

  # ~~~ Advanced settings — LEAVE AS-IS ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

  # Scope/intent text is found via: 1) profiler JSON → 2) direct heading scan → 3) "(Not detected)"
  # TIP: Run Step 0 (profiler) first for best results.
  max_scope_chars: 300
  max_intent_chars: 300

  # Tag generation — multiple sources combined into a comma-separated list.
  tags:
    include_doc_type: true          # Add "Type-B" etc. from profiler
    include_sections_found: true    # Add "has-scope", "has-controls" etc.

    # Path to Acronym Finder output Excel (run Misc/Acronym Finder first).
    # Leave "" to skip. Reads "Per Document" sheet, matches by filename.
    acronym_audit_file: ""
    max_acronym_tags: 15        # Most-frequent first. 0 = unlimited.

    # Static tags added to ALL documents (e.g., ["InfoSec", "GCC-High"])
    static_tags: []


# ============================================================================
# SECTION 13: DOCX TO MARKDOWN (standalone — Misc/DPS_docx2md/)
# ============================================================================
# Standalone tool for converting .docx files to clean markdown optimised for
# RAG pipelines. Not part of the main pipeline — run separately.
#
# USAGE:
#   cd "Misc/DPS_docx2md"
#   python DPS_docx2md.py --config ../../dps_config.yaml
#   python DPS_docx2md.py --config ../../dps_config.yaml ../../input ../../output/markdown
#
# Input: Uses the main pipeline's input.directory setting (Section 1) by default.
# Output: Writes to output/markdown/ (configurable below).

docx2md:
  # Where converted .md files are written (relative to config file location)
  output_directory: "./output/markdown"

  # --- Image handling ---
  # "extract"     → save images to disk + insert markdown references
  # "placeholder" → insert [Image: description] text only
  # "skip"        → ignore images entirely
  image_handling: "extract"
  image_subfolder: "images"          # subfolder name under each doc's image dir

  # --- Table conversion strategy ---
  # "auto"     → simple tables as markdown pipe tables, merged cells as HTML (recommended)
  # "markdown" → force pipe tables for everything (merged cells flattened)
  # "html"     → use HTML <table> for all tables
  table_strategy: "auto"

  # --- Heading cleanup ---
  # Shift heading levels so the document starts at H1
  heading_normalization: true

  # --- Text cleanup ---
  max_consecutive_blank_lines: 2     # collapse runs of blank lines
  clean_smart_quotes: true           # convert smart quotes to standard ASCII
  strip_zero_width_chars: true       # remove zero-width spaces, BOM, etc.
  extract_text_boxes: true           # extract floating text box content inline

  # --- Logging ---
  log_file_prefix: "docx2md_log"    # produces docx2md_log_2026-03-24_143052.xlsx

  # --- Metadata frontmatter ---
  # Controls which fields appear in the YAML frontmatter block at the top of
  # each .md file. Add, remove, or reorder entries to customise.
  #
  # Each field has:
  #   name:     field name in the YAML output
  #   source:   where to pull the value from:
  #              "core:<property>"         → doc.core_properties
  #                  (title, author, created, modified, subject, keywords, revision)
  #              "filename"                → source .docx filename (always available)
  #              "filename_regex:<pattern>" → extract via regex capture group from filename
  #              "static:<value>"          → hardcoded value (e.g. organisation name)
  #              "converted_date"          → timestamp of conversion run
  #   default:  fallback if source is empty (optional)
  include_metadata_frontmatter: true

  metadata_fields:
    - name: "title"
      source: "core:title"
      default: ""
    - name: "source_file"
      source: "filename"
    - name: "author"
      source: "core:author"
      default: "Unknown"
    - name: "created"
      source: "core:created"
      default: ""
    - name: "modified"
      source: "core:modified"
      default: ""
    - name: "doc_id"
      source: "filename_regex:([A-Z]+-[A-Z]+-\\d{4}-\\d+)"
      default: ""
    - name: "converted"
      source: "converted_date"
    # --- Add your own fields below this line ---
    # - name: "organization"
    #   source: "static:Acme Corp"
    # - name: "classification"
    #   source: "core:subject"
    # - name: "keywords"
    #   source: "core:keywords"
