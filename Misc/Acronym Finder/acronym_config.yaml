# ============================================================
# ACRONYM FINDER CONFIG
# ============================================================
# This config controls what the script looks for, what it
# ignores, and where it looks. Edit this file, not the script.
# ============================================================

# --- INPUT / OUTPUT ---
# These are fallbacks only. If dps_config.yaml is found in a parent directory,
# input_folder is automatically read from input.directory there.
input_folder: "../../input"            # Relative to this config file's location
output_file: "../../output/acronym_audit.xlsx"    # Where the Excel report goes

# --- SEARCH SETTINGS ---
search:
  # Minimum length for an acronym candidate (2 = "AC", 3 = "MFA")
  min_length: 2
  # Maximum length (filters out long ALL-CAPS words that aren't acronyms)
  max_length: 8
  # Include acronyms found inside tables?
  scan_tables: true
  # Include acronyms found in headers/footers?
  scan_headers_footers: true
  # Include acronyms found in text boxes? (requires fallback XML parse)
  scan_textboxes: true
  # Minimum number of occurrences across ALL docs before it shows in results
  min_global_occurrences: 1
  # Minimum number of occurrences within a SINGLE doc before it shows
  min_doc_occurrences: 1

# --- DETECTION PATTERNS ---
# The script catches these patterns:
#   1. Pure uppercase 2-10 chars (e.g., NIST, MFA, GCC)
#   2. Mixed with numbers (e.g., AC-2, SP800-53, FedRAMP)
#   3. Slash-separated (e.g., IT/OT, C&A)
#   4. Parenthetical definitions: "Federal Risk and Authorization Management Program (FedRAMP)"
#
# You generally don't need to touch these. Override only if you
# get tons of false positives from a specific pattern.
patterns:
  pure_caps: true          # ABC, NIST, GCC
  caps_with_numbers: true  # AC-2, 800-53
  caps_with_hyphens: true  # FedRAMP, ATO-P
  caps_with_slashes: true  # IT/OT, CI/CD
  parenthetical_defs: true # "Multi-Factor Authentication (MFA)"

# --- IGNORE LIST ---
# Acronyms and uppercase words to SKIP entirely.
# Add anything that clutters your results: common English
# words that happen to be uppercase, formatting artifacts, etc.
#
# Case-insensitive matching. "nist" ignores "NIST" and "Nist".
ignore_list:
  # -- Common English words that appear as all-caps --
  - "THE"
  - "AND"
  - "FOR"
  - "NOT"
  - "BUT"
  - "ALL"
  - "ARE"
  - "CAN"
  - "HAS"
  - "HER"
  - "WAS"
  - "ONE"
  - "OUR"
  - "OUT"
  - "YOU"
  - "USE"
  - "MAY"
  - "SHALL"
  - "MUST"
  - "WILL"
  - "WITH"
  - "THIS"
  - "THAT"
  - "FROM"
  - "THEY"
  - "BEEN"
  - "HAVE"
  - "EACH"
  - "MAKE"
  - "WHEN"
  - "DOES"
  - "INTO"
  - "THEM"
  - "THEN"
  - "THAN"
  - "ONLY"
  - "OVER"
  - "SUCH"
  - "ALSO"
  - "SOME"
  - "THESE"
  - "OTHER"
  - "WHICH"
  - "THEIR"
  - "THERE"
  - "WOULD"
  - "ABOUT"
  - "AFTER"
  - "COULD"
  - "WHERE"
  - "SHOULD"
  - "THOSE"

  # -- Roman numerals --
  - "II"
  - "III"
  - "IV"
  - "VI"
  - "VII"
  - "VIII"
  - "IX"
  - "XI"
  - "XII"

  # -- Formatting / doc artifacts --
  - "PAGE"
  - "DATE"
  - "DRAFT"
  - "FINAL"
  - "NOTE"
  - "TABLE"
  - "FIGURE"
  - "REV"
  - "VER"
  - "NA"
  - "TBD"
  - "TODO"
  - "YES"
  - "NO"

  # -- Add your own below --
  # - "YOURTERM"
