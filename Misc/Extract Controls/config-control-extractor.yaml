# =============================================================
# config-control-extractor.yaml
# Configuration for extract_controls.py
# =============================================================

# --- Control ID patterns ---
# Regex patterns to match control IDs in document text.
# Multiple patterns supported; a paragraph matches if ANY pattern hits.
control_id_patterns:
  - '\b[A-Z]{2,4}[-.]?\d{1,3}[-.]\d{2,4}\b'   # AC-1.001, IR001.002, CFG.1.0042

# --- Whitelist / Blacklist ---
# Supports exact IDs ("AC-1.001") and prefix wildcards ("AC-*").
# Whitelist: if non-empty, ONLY matching controls are kept.
# Blacklist: matching controls are excluded (applied after whitelist).
whitelist: []
blacklist: []

# --- Text classification keywords ---
# Keywords that mark the boundary between control description and
# supplemental guidance. Case-insensitive matching.
guidance_keywords:
  - "implementation guidance"
  - "implementation:"
  - "guidelines:"
  - "how to implement"
  - "supplemental guidance"

# --- Metadata trigger keywords ---
# Used to extract document-level metadata from the first 40 paragraphs.
metadata_triggers:
  purpose:
    - "purpose"
    - "objective"
    - "intent"
  scope:
    - "scope"
    - "coverage"
    - "boundary"
  applicability:
    - "applicability"
    - "applies to"
    - "applies for"

# --- Section heading detection ---
heading_detection:
  # Detect paragraphs with Word "Heading" styles (Heading 1, Heading 2, etc.)
  use_word_heading_style: true

  # Regex: lines starting with "Section 1", "Section 02", etc.
  section_keyword_pattern: '^[Ss]ection\s+\d{1,2}'

  # Regex: numbered titles like "2.1 Access Control Policy"
  numbered_title_pattern: '^\d{1,2}\.?\d{0,2}\s+[A-Z][a-zA-Z\s]{3,50}$'

  # ALL-CAPS lines treated as headers if short enough and multi-word
  detect_allcaps: true
  allcaps_max_length: 80
  allcaps_min_words: 3

  # Bold short lines (without trailing period) treated as headers
  detect_bold_short: true
  bold_max_length: 60
