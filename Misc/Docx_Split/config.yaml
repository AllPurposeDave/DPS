# ============================================================================
# Docx_Split Configuration
# ----------------------------------------------------------------------------
# All runtime settings are defined here. Edit the values and re-run the
# script. Paths are resolved relative to this file's directory; absolute
# paths are also accepted.
# ============================================================================

# --- Directories -------------------------------------------------------------
input_dir: input            # Source .docx files are read from this directory.
output_dir: output          # Split .docx files are written here.

# --- URL and deletion lookup -------------------------------------------------
# The script reads an Excel workbook to resolve (a) the published URL to be
# stamped onto every output, and (b) an optional comma-separated list of
# section headings to remove from a given document before splitting.
url_xlsx: input/Doc_URL.xlsx
url_xlsx_sheet: URL Mapping
doc_name_column: Document_Name          # Column holding the document stem (without the .docx extension).
url_column: URL                         # Column holding the published URL.
delete_headings_column: Delete_Headings # Column holding comma-separated headings to remove. Leave blank to keep the full document.

# --- Splitting ---------------------------------------------------------------
max_char_count: 36000                   # Maximum character count per output .docx.
heading_levels: [1, 2, 3]               # Only these heading levels are eligible as split boundaries.

# --- URL preamble ------------------------------------------------------------
url_preamble_enabled: true              # When true, a visible "Published URL: ..." paragraph is written at the top of every output.
url_preamble_label: "Published URL:"    # Label printed before the URL in the preamble.

# When true, the URL is additionally written into the document page header
# so that it appears on every rendered page. Use this for RAG pipelines that
# chunk per page and would otherwise lose the URL after the first page.
url_repeat_in_page_header: false

# --- Table flattening --------------------------------------------------------
# When true, any table with exactly two columns and no merged cells is
# rewritten as a heading followed by one "col1: col2" paragraph per row.
# This aids RAG pipelines that index Word tables poorly. Tables with merged
# cells (vertical or horizontal) are left intact to avoid reordering or
# duplicating content.
flatten_2_col_table: true
flatten_2_col_separator: ": "                 # Separator placed between the two columns.
flatten_2_col_heading_level: 2                # Heading level (1-9) of the inserted heading.
flatten_2_col_heading_default: "Definitions"  # Heading used when the first row is not identifiable as a header.

# --- Filenames ---------------------------------------------------------------
# Output files are named:  "<source_stem> - <first_heading_in_chunk>.docx"
filename_suffix_max_len: 50             # Maximum length of the heading suffix in output filenames.
