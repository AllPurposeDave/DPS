# ============================================================================
# DOCX Policy Document Profiler - Configuration
# ============================================================================
# This config drives the profiling script. Adjust thresholds, patterns, and
# output settings here. No code changes needed.
#
# Usage: python policy_profiler.py --config profiler_config.yaml --input ./docs/
# ============================================================================

# --- Input/Output -----------------------------------------------------------
input:
  # Path to folder containing .docx files (recursive scan)
  directory: "./policy_docs"
  # File glob pattern
  pattern: "*.docx"
  # Recurse into subdirectories
  recursive: true
  # Skip files matching these patterns (case-insensitive substring match)
  exclude_patterns:
    - "~$"           # Word temp files
    - "_optimized"   # Already processed
    - "_backup"
    - "template"

output:
  # Where profiling results land
  directory: "./profiler_output"
  # Master inventory spreadsheet
  inventory_file: "document_inventory.xlsx"
  # Detailed per-doc JSON dump (for downstream automation)
  json_file: "document_profiles.json"
  # Section-level detail CSV (one row per section per doc)
  sections_file: "section_inventory.csv"
  # Table-level detail CSV (one row per table per doc)
  tables_file: "table_inventory.csv"
  # Cross-reference detail CSV
  crossrefs_file: "crossref_inventory.csv"

# --- Document Structure Detection -------------------------------------------
# These patterns detect the standard 5-section policy structure.
# Each key maps to a list of fuzzy-match patterns (case-insensitive).
# The profiler checks H1-level headings against these patterns.
sections:
  purpose:
    - "purpose"
    - "policy purpose"
    - "1.0 purpose"
    - "document purpose"
  scope:
    - "scope"
    - "policy scope"
    - "2.0 scope"
    - "applicability"
    - "applicability and scope"
  intent:
    - "intent"
    - "policy intent"
    - "3.0 intent"
    - "objective"
    - "policy objective"
    - "security objective"
  controls:
    - "controls"
    - "technical controls"
    - "security controls"
    - "4.0 controls"
    - "control requirements"
    - "requirements"
    - "policy requirements"
    - "implementation requirements"
  appendix:
    - "appendix"
    - "appendices"
    - "5.0 appendix"
    - "supplementary"
    - "reference"
    - "references"
    - "glossary"
    - "definitions"

# --- Heading Detection -------------------------------------------------------
headings:
  # Word built-in heading style names to recognize
  builtin_styles:
    - "Heading 1"
    - "Heading 2"
    - "Heading 3"
    - "Heading 4"
    - "heading 1"
    - "heading 2"
    - "heading 3"
    - "heading 4"
  # Custom style names that function as headings in your org's templates.
  # Add your org-specific style names here.
  #
  # IF HEADINGS ARE SHOWING AS "FAKE" BUT THEY'RE REAL HEADINGS IN WORD:
  #   The paragraph is using a custom style name not in this list.
  #   To find the exact style name:
  #     1. Open the document in Word
  #     2. Click on the heading paragraph
  #     3. Look at the Styles pane (Home tab, Styles group) — the active style is highlighted
  #     4. Copy the exact name and add it here, preserving capitalization
  custom_heading_styles:
    - "Policy Heading 1"
    - "Policy Heading 2"
    - "TOC Heading"
    - "AppendixHeading"

  # Font size threshold (pt) for detecting "fake" bold headings.
  # A paragraph with bold text + font size >= this value + no heading style = fake heading.
  #
  # IF FAKE HEADINGS ARE NOT BEING DETECTED (count shows 0 but you can see bold headers):
  #   Your org's documents may use 11pt bold for headers instead of 12pt.
  #   Lower this value to 11. You can also try 10 if 11 doesn't catch them.
  #
  # IF TOO MANY THINGS ARE FLAGGED AS FAKE HEADINGS (normal bold text in paragraphs):
  #   Raise this value to 13 or 14 to require a larger font before flagging.
  fake_heading_min_font_size: 12

  # Maximum character length for a paragraph to qualify as a fake heading.
  # Short bold text (a heading) vs. long bold text (an emphasis in a paragraph).
  # Default 200 is conservative — most real headings are under 100 characters.
  fake_heading_max_chars: 200

# --- Cross-Reference Detection -----------------------------------------------
cross_references:
  # Regex patterns to detect cross-references (case-insensitive)
  patterns:
    - "see section\\s+[\\d\\.]+[a-z]?"
    - "refer to\\s+(section|the)"
    - "as described in\\s+(the|section)"
    - "per section\\s+[\\d\\.]+"
    - "in accordance with\\s+(the|section)"
    - "as defined in\\s+(the|section)"
    - "as outlined in\\s+(the|section)"
    - "per the organization'?s\\s+\\w+"
    - "see the\\s+\\w+\\s+policy"
    - "as specified in\\s+(the|section)"
  # Also detect hyperlinks with section-title-like visible text
  detect_hyperlink_crossrefs: true

# --- Table Classification ----------------------------------------------------
tables:
  # Heuristics to classify table types based on first-row content
  # Each type has keywords to match against header row cell text
  classification:
    control_matrix:
      keywords:
        - "control id"
        - "control"
        - "requirement"
        - "framework"
        - "nist"
        - "status"
        - "implementation"
        - "responsible"
        - "owner"
      min_columns: 3
    applicability_table:
      keywords:
        - "applies to"
        - "applicability"
        - "system"
        - "environment"
        - "in scope"
        - "yes"
        - "no"
        - "n/a"
      min_columns: 2
    reference_table:
      keywords:
        - "term"
        - "definition"
        - "acronym"
        - "glossary"
        - "abbreviation"
        - "description"
      min_columns: 2
    crosswalk_table:
      keywords:
        - "nist"
        - "cis"
        - "cmmc"
        - "iso"
        - "mapping"
        - "alignment"
        - "framework"
      min_columns: 3
    role_responsibility:
      keywords:
        - "role"
        - "responsibility"
        - "responsible"
        - "accountable"
        - "raci"
      min_columns: 2

# --- Document Type Classification Thresholds ----------------------------------
# These thresholds auto-classify docs into Types A/B/C/D per your workflow.
classification:
  # Type A: Table-Heavy Control Docs
  type_a:
    min_table_content_pct: 40   # >40% content in tables
  # Type B: Prose-Heavy Intent Docs
  type_b:
    max_table_content_pct: 10   # <10% content in tables
  # Type C: Hybrid Docs (between A and B thresholds, with procedures)
  type_c:
    procedure_keywords:          # Keywords signaling embedded procedures
      - "step 1"
      - "step 2"
      - "procedure"
      - "escalation"
      - "workflow"
      - "response process"
      - "playbook"
  # Type D: Appendix-Dominant Docs
  type_d:
    min_appendix_content_pct: 60 # >60% content in appendix sections

# --- Size and Optimization Thresholds ----------------------------------------
thresholds:
  # Copilot retrieval: files should be under this many characters
  max_characters: 36000
  # Approximate page equivalent
  max_pages: 20
  # Paragraphs per page estimate (for page approximation).
  # The script cannot read actual Word page counts, so it estimates:
  #   approx_pages = total_paragraph_count / paragraphs_per_page
  #
  # IF PAGE COUNTS LOOK TOO HIGH (e.g., 60 pages for what you know is 30 pages):
  #   Your documents have many short paragraphs (bullet lists, single-line items).
  #   Lower this value to 20 or 25.
  #
  # IF PAGE COUNTS LOOK TOO LOW (e.g., 10 pages for what you know is 25 pages):
  #   Your documents have dense, long paragraphs (narrative prose).
  #   Raise this value to 35 or 40.
  #
  # TO CALIBRATE: Open one representative document in Word.
  #   Note its actual page count (shown in the status bar at the bottom).
  #   Then estimate its paragraph count (Ctrl+End, check the paragraph counter).
  #   Set paragraphs_per_page = paragraph_count / actual_page_count.
  paragraphs_per_page: 30
  # Flag sections exceeding this % of total doc length
  section_dominance_pct: 50
  # Flag documents exceeding this many tables
  high_table_count: 10

# --- Scoring Weights ----------------------------------------------------------
# Used to compute a combined priority score for ranking documents.
# Higher score = higher optimization priority.
# All weights are relative (normalized internally).
priority_scoring:
  weights:
    table_count: 2.0          # More tables = harder to optimize = higher priority
    cross_ref_count: 1.5      # More cross-refs = more work
    fake_heading_count: 1.0   # Fake headings break chunking
    page_count: 0.5           # Longer docs need splitting
    missing_sections: 1.5     # Missing standard sections = structural problems
    merged_cells: 1.0         # Merged cells complicate table flattening
    over_size_limit: 3.0      # Over 36k chars is a hard retrieval problem
  # Optional: manually assign usage frequency scores per document (scale 0-10).
  # 0 = nobody asks about this policy. 10 = most-queried policy in the org.
  # These scores are multiplied by 2.0 and added to the priority score,
  # so a score of 9 adds 18 points — enough to move a simple doc to the top.
  #
  # HOW TO USE:
  #   Uncomment the lines below and replace the example filenames with your
  #   actual filenames (must match exactly, including capitalization and spaces).
  #   Leave usage_frequency: {} if you don't want to use this feature.
  #
  # EXAMPLE:
  #   usage_frequency:
  #     "Access Control Policy.docx": 9
  #     "Acceptable Use Policy.docx": 7
  #     "Incident Response Policy.docx": 8
  usage_frequency: {}
